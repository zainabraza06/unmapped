name: unmapped
description: UNMAPPED — Labor Intelligence System for LMIC contexts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP client — small, no extra dependencies
