  # Lightweight state management
  provider: ^6.1.2
  # Persistent storage for country preference
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
